<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint 1C Validation Test — MyCutiePie</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem;
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.5;
  }
  .vt-container {
    max-width: 1400px;
    margin: 0 auto;
  }
  .vt-header {
    background: linear-gradient(135deg, #581c87, #be185d);
    padding: 1.5rem 2rem;
    border-radius: 16px;
    margin-bottom: 2rem;
  }
  .vt-header h1 {
    margin: 0;
    font-size: 1.5rem;
  }
  .vt-header p {
    margin: 0.5rem 0 0;
    opacity: 0.85;
    font-size: 0.95rem;
  }
  .vt-config {
    background: #141414;
    padding: 1.5rem;
    border-radius: 12px;
    margin-bottom: 2rem;
    border: 1px solid #2a2a2a;
  }
  .vt-config label {
    display: block;
    font-weight: 600;
    color: #a78bfa;
    margin-bottom: 0.5rem;
    margin-top: 1rem;
  }
  .vt-config label:first-child { margin-top: 0; }
  .vt-config select,
  .vt-config input,
  .vt-config textarea {
    width: 100%;
    padding: 0.6rem;
    background: #1a1a1a;
    color: #e5e5e5;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.9rem;
  }
  .vt-config textarea {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 0.85rem;
    min-height: 100px;
    resize: vertical;
  }
  .vt-topics-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .vt-topic-pill {
    background: #1a1a1a;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #2a2a2a;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .vt-topic-pill:hover {
    background: #2a2a2a;
    border-color: #8b5cf6;
  }
  .vt-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .vt-btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .vt-btn-primary { background: #8b5cf6; color: white; }
  .vt-btn-primary:hover { background: #7c3aed; }
  .vt-btn-primary:disabled { background: #374151; cursor: not-allowed; opacity: 0.6; }
  .vt-btn-secondary { background: #374151; color: white; }
  .vt-btn-secondary:hover { background: #4b5563; }
  .vt-comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 1rem;
  }
  .vt-panel {
    background: #141414;
    padding: 1.25rem;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    min-height: 200px;
  }
  .vt-panel.with-brief {
    border-left: 4px solid #8b5cf6;
  }
  .vt-panel.without-brief {
    border-left: 4px solid #6b7280;
  }
  .vt-panel h3 {
    margin: 0 0 0.75rem;
    font-size: 0.95rem;
    color: #a78bfa;
  }
  .vt-panel.without-brief h3 {
    color: #9ca3af;
  }
  .vt-panel pre {
    background: #0a0a0a;
    padding: 1rem;
    border-radius: 8px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 0.8rem;
    overflow-x: auto;
    max-height: 500px;
    overflow-y: auto;
    color: #d4d4d4;
    margin: 0;
  }
  .vt-results {
    margin-top: 2rem;
  }
  .vt-results h2 {
    color: #f472b6;
    border-bottom: 2px solid #2a2a2a;
    padding-bottom: 0.5rem;
  }
  .vt-test-run {
    background: #141414;
    padding: 1.5rem;
    border-radius: 12px;
    margin-bottom: 1.5rem;
    border: 1px solid #2a2a2a;
  }
  .vt-test-run-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .vt-test-run-header strong {
    color: #c4b5fd;
    font-size: 1.05rem;
  }
  .vt-test-run-header span {
    color: #6b7280;
    font-size: 0.85rem;
  }
  .vt-status {
    padding: 0.5rem 1rem;
    background: #1a1a1a;
    border-radius: 6px;
    font-size: 0.9rem;
    color: #9ca3af;
  }
  .vt-status.active { color: #fbbf24; }
  .vt-status.success { color: #10b981; }
  .vt-status.error { color: #ef4444; }
  .vt-banner {
    background: #1e3a8a;
    color: #dbeafe;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.9rem;
  }
  .vt-banner.warning {
    background: #7c2d12;
    color: #fed7aa;
  }
</style>
</head>
<body>

<div class="vt-container">

  <div class="vt-header">
    <h1>🧪 Sprint 1C — Validation Test</h1>
    <p>Confronto side-by-side: AI output con vs senza channel_brief injection. Misura empiricamente l'efficacia del brief.</p>
  </div>

  <div id="vt-auth-status"></div>

  <div class="vt-config">

    <label>Channel</label>
    <select id="vt-channel-selector">
      <option>Loading channels...</option>
    </select>

    <label>AI Capability</label>
    <input type="text" id="vt-capability" value="title_generation" placeholder="e.g. title_generation, idea_gate, seo_pack">

    <label>Topic to test (single per comparison)</label>
    <input type="text" id="vt-topic" placeholder="e.g. Why 401k default options are designed to fail you">

    <label>Params JSON (advanced — adjust if your capability uses different param names)</label>
    <textarea id="vt-params" placeholder='{"topic": "...", "count": 3}'>{"topic": "TOPIC_HERE", "count": 3}</textarea>

    <label>Quick-fill topics (click to use)</label>
    <div id="vt-quick-topics" class="vt-topics-list"></div>

    <div class="vt-actions">
      <button class="vt-btn vt-btn-primary" id="vt-run-btn">▶ Run Comparison</button>
      <button class="vt-btn vt-btn-secondary" id="vt-export-results">📤 Export All Results</button>
      <button class="vt-btn vt-btn-secondary" id="vt-clear-results">🗑 Clear All Results</button>
    </div>

    <div class="vt-status" id="vt-status">Ready</div>
  </div>

  <div class="vt-results">
    <h2>Test Runs</h2>
    <div id="vt-test-runs">
      <p style="color: #6b7280;">Nessun test ancora. Configura sopra e clicca "Run Comparison".</p>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://wibbjxynnrwbnzohqwlt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpYmJqeHlubnJ3Ym56b2hxd2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTkzODYsImV4cCI6MjA5Mzk3NTM4Nn0.uZGF4eP_CcjUKZdHBUAZF3cucEWDuec2rNYW6bn4eiE';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// State
let currentChannels = [];
let currentChannelId = null;
let testRuns = JSON.parse(localStorage.getItem('vt_test_runs') || '[]');

// Quick-fill topics per canale
const QUICK_TOPICS = {
  'The Invisible Money': [
    'Why 401k default options are silently draining your retirement',
    'The hidden 7% fee structure in mutual funds your advisor never shows',
    'How banks legally make $40K from your "free" savings account',
    'The retirement math that proves you\'ll work until 75 with current strategy',
    'Why high-earning professionals retire poorer than middle-class savers'
  ],
  'The Invisible Mind': [
    'Why you buy things you don\'t need (the $4,800/year decision trap)',
    'The micro-expression that predicts a bad business deal in 30 seconds',
    'Why successful people make worse decisions under pressure',
    'How anchoring bias controls 70% of your salary negotiations',
    'The cognitive bias that makes you waste 2 hours/day on social media'
  ]
};

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('vt-auth-status').innerHTML = `
      <div class="vt-banner warning">
        ⚠ Non autenticato. Vai prima su https://mycutiepie-production.netlify.app/ per fare login, poi torna qui.
      </div>`;
    return null;
  }
  return session;
}

// ═══════════════════════════════════════════════════════════════
// LOAD channels
// ═══════════════════════════════════════════════════════════════
async function loadChannels() {
  const session = await checkAuth();
  if (!session) return;

  const { data, error } = await sb
    .from('channels')
    .select('id, name, channel_brief')
    .eq('user_id', session.user.id)
    .not('channel_brief', 'is', null)
    .order('created_at', { ascending: true });

  if (error) {
    setStatus('❌ Error: ' + error.message, 'error');
    return;
  }

  currentChannels = data;
  const selector = document.getElementById('vt-channel-selector');
  selector.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  if (data.length > 0) {
    currentChannelId = data[0].id;
    selector.value = data[0].id;
    renderQuickTopics(data[0].name);
  }

  selector.onchange = (e) => {
    currentChannelId = e.target.value;
    const channel = currentChannels.find(c => c.id === currentChannelId);
    renderQuickTopics(channel?.name);
  };

  setStatus(`✅ Loaded ${data.length} channel(s) with brief`, 'success');
}

function renderQuickTopics(channelName) {
  const topics = QUICK_TOPICS[channelName] || [];
  const container = document.getElementById('vt-quick-topics');
  container.innerHTML = topics.map(t => 
    `<div class="vt-topic-pill" data-topic="${escapeHtml(t)}">${escapeHtml(t)}</div>`
  ).join('');
  
  container.querySelectorAll('.vt-topic-pill').forEach(pill => {
    pill.onclick = () => {
      const topic = pill.getAttribute('data-topic');
      document.getElementById('vt-topic').value = topic;
      // Auto-update params JSON
      try {
        const params = JSON.parse(document.getElementById('vt-params').value);
        params.topic = topic;
        document.getElementById('vt-params').value = JSON.stringify(params, null, 2);
      } catch {
        document.getElementById('vt-params').value = JSON.stringify({topic, count: 3}, null, 2);
      }
    };
  });
}

// ═══════════════════════════════════════════════════════════════
// RUN comparison
// ═══════════════════════════════════════════════════════════════
async function runComparison() {
  const session = await checkAuth();
  if (!session) return;

  const channelId = currentChannelId;
  const capability = document.getElementById('vt-capability').value.trim();
  const topic = document.getElementById('vt-topic').value.trim();
  let paramsRaw = document.getElementById('vt-params').value.trim();

  if (!channelId || !capability || !topic) {
    setStatus('❌ Compila tutti i campi', 'error');
    return;
  }

  let params;
  try {
    params = JSON.parse(paramsRaw);
    // Auto-replace TOPIC_HERE if present
    Object.keys(params).forEach(k => {
      if (typeof params[k] === 'string' && params[k].includes('TOPIC_HERE')) {
        params[k] = params[k].replace('TOPIC_HERE', topic);
      }
    });
    // If topic key empty, set it
    if (!params.topic) params.topic = topic;
  } catch (e) {
    setStatus('❌ Params JSON invalido: ' + e.message, 'error');
    return;
  }

  setStatus('⏳ Generating WITH brief...', 'active');
  document.getElementById('vt-run-btn').disabled = true;

  const channel = currentChannels.find(c => c.id === channelId);

  try {
    // Call 1: WITH brief
    const withBrief = await callAiRouter(session.access_token, {
      capability,
      channel_id: channelId,
      params,
      bypass_brief: false
    });

    setStatus('⏳ Generating WITHOUT brief...', 'active');

    // Call 2: WITHOUT brief
    const withoutBrief = await callAiRouter(session.access_token, {
      capability,
      channel_id: channelId,
      params,
      bypass_brief: true
    });

    // Save test run
    const run = {
      timestamp: new Date().toISOString(),
      channel: channel?.name,
      channelId,
      capability,
      topic,
      params,
      withBrief,
      withoutBrief
    };
    testRuns.unshift(run);
    if (testRuns.length > 50) testRuns = testRuns.slice(0, 50); // cap at 50
    localStorage.setItem('vt_test_runs', JSON.stringify(testRuns));

    renderTestRuns();
    setStatus('✅ Comparison complete', 'success');
  } catch (e) {
    setStatus('❌ Error: ' + e.message, 'error');
  } finally {
    document.getElementById('vt-run-btn').disabled = false;
  }
}

async function callAiRouter(token, body) {
  const response = await fetch(`${SUPABASE_URL}/functions/v1/ai-router`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      'apikey': SUPABASE_ANON_KEY
    },
    body: JSON.stringify(body)
  });

  const data = await response.json();
  return {
    status: response.status,
    ok: response.ok,
    brief_injected: data.brief_injected,
    data: data.data || data
  };
}

// ═══════════════════════════════════════════════════════════════
// RENDER test runs
// ═══════════════════════════════════════════════════════════════
function renderTestRuns() {
  const container = document.getElementById('vt-test-runs');
  if (testRuns.length === 0) {
    container.innerHTML = '<p style="color: #6b7280;">Nessun test ancora.</p>';
    return;
  }

  container.innerHTML = testRuns.map((run, idx) => `
    <div class="vt-test-run">
      <div class="vt-test-run-header">
        <strong>${escapeHtml(run.channel)} · ${escapeHtml(run.capability)}</strong>
        <span>${new Date(run.timestamp).toLocaleString()}</span>
      </div>
      <p style="color: #c4b5fd; margin: 0 0 1rem; font-style: italic;">${escapeHtml(run.topic)}</p>
      
      <div class="vt-comparison">
        <div class="vt-panel with-brief">
          <h3>✅ WITH BRIEF (brief_injected=${run.withBrief.brief_injected})</h3>
          <pre>${formatResponse(run.withBrief.data)}</pre>
        </div>
        <div class="vt-panel without-brief">
          <h3>⛔ WITHOUT BRIEF (bypass_brief=true)</h3>
          <pre>${formatResponse(run.withoutBrief.data)}</pre>
        </div>
      </div>
    </div>
  `).join('');
}

function formatResponse(data) {
  if (typeof data === 'string') return escapeHtml(data);
  return escapeHtml(JSON.stringify(data, null, 2));
}

// ═══════════════════════════════════════════════════════════════
// EXPORT all results
// ═══════════════════════════════════════════════════════════════
function exportResults() {
  if (testRuns.length === 0) {
    setStatus('Nessun test da esportare', 'error');
    return;
  }

  let md = `# Sprint 1C Validation Test Results\n\n`;
  md += `**Generated**: ${new Date().toISOString()}\n`;
  md += `**Total test runs**: ${testRuns.length}\n\n`;
  md += `---\n\n`;

  testRuns.forEach((run, idx) => {
    md += `## Test #${testRuns.length - idx} — ${run.channel} · ${run.capability}\n\n`;
    md += `**Timestamp**: ${new Date(run.timestamp).toLocaleString()}\n`;
    md += `**Topic**: ${run.topic}\n\n`;
    md += `### ✅ WITH BRIEF (brief_injected=${run.withBrief.brief_injected})\n\n`;
    md += '```json\n' + JSON.stringify(run.withBrief.data, null, 2) + '\n```\n\n';
    md += `### ⛔ WITHOUT BRIEF (bypass_brief=true)\n\n`;
    md += '```json\n' + JSON.stringify(run.withoutBrief.data, null, 2) + '\n```\n\n';
    md += `---\n\n`;
  });

  downloadFile('sprint1c-validation-results.md', md);
  setStatus(`✅ Exported ${testRuns.length} runs`, 'success');
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function clearResults() {
  if (!confirm('Cancellare tutti i risultati salvati? (irreversibile)')) return;
  testRuns = [];
  localStorage.removeItem('vt_test_runs');
  renderTestRuns();
  setStatus('✅ Cleared', 'success');
}

// ═══════════════════════════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════════════════════════
function setStatus(msg, type) {
  const el = document.getElementById('vt-status');
  el.textContent = msg;
  el.className = 'vt-status' + (type ? ' ' + type : '');
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m]
  );
}

// ═══════════════════════════════════════════════════════════════
// Bind & init
// ═══════════════════════════════════════════════════════════════
document.getElementById('vt-run-btn').onclick = runComparison;
document.getElementById('vt-export-results').onclick = exportResults;
document.getElementById('vt-clear-results').onclick = clearResults;

loadChannels();
renderTestRuns();
</script>

</body>
</html>
